			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "# Find the DerivedData root containing SourcePackages\nSEARCH_ROOT=\"${BUILD_DIR}\"\nwhile [ ! -d \"${SEARCH_ROOT}/SourcePackages\" ] && [ \"${SEARCH_ROOT}\" != \"/\" ]; do\n    SEARCH_ROOT=$(dirname \"${SEARCH_ROOT}\")\ndone\nSPM_CHECKOUTS=\"${SEARCH_ROOT}/SourcePackages/checkouts\"\n\nfix_plist() {\n    local plist=\"$1\"\n    chmod +w \"$plist\" 2>/dev/null\n    /usr/libexec/PlistBuddy -c \"Set :MinimumOSVersion 16.0\" \"$plist\" 2>/dev/null || /usr/libexec/PlistBuddy -c \"Add :MinimumOSVersion string 16.0\" \"$plist\" 2>/dev/null\n    /usr/libexec/PlistBuddy -c \"Set :CFBundleShortVersionString 1.0\" \"$plist\" 2>/dev/null || /usr/libexec/PlistBuddy -c \"Add :CFBundleShortVersionString string 1.0\" \"$plist\" 2>/dev/null\n    /usr/libexec/PlistBuddy -c \"Set :CFBundleVersion 1\" \"$plist\" 2>/dev/null || /usr/libexec/PlistBuddy -c \"Add :CFBundleVersion string 1\" \"$plist\" 2>/dev/null\n    local currentType\n    currentType=$(/usr/libexec/PlistBuddy -c \"Print :CFBundlePackageType\" \"$plist\" 2>/dev/null)\n    if [ \"$currentType\" = \"XFWK\" ]; then\n        /usr/libexec/PlistBuddy -c \"Set :CFBundlePackageType FMWK\" \"$plist\"\n    fi\n}\n\n# Fix source xcframework plists before they get embedded\nif [ -d \"$SPM_CHECKOUTS\" ]; then\n    find \"$SPM_CHECKOUTS\" -path \"*.framework/Info.plist\" | while read plist; do\n        fix_plist \"$plist\"\n    done\nfi\n";
		};
