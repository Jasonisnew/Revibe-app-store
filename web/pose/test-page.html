<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pose Detector Test Page</title>
  </head>
  <body style="margin: 24px;">
    <main>
      <div id="pose-test-root"></div>
      <p style="font-family: system-ui, sans-serif; margin-top: 16px; color: #555; max-width: 760px;">
        Wire this into MediaPipe by calling <code>window.pushPoseLandmarks(results.poseLandmarks, performance.now())</code>
        inside your pose callback. This page only provides a test block for detector output and feedback.
      </p>
    </main>

    <script type="module">
      import { mountPoseTestBlock } from './testPoseBlock.js';

      const root = document.getElementById('pose-test-root');
      const panel = mountPoseTestBlock(root);

      // Exposed globally for quick testing from your MediaPipe callback or devtools.
      window.pushPoseLandmarks = panel.ingestLandmarks;
    </script>
  </body>
</html>
